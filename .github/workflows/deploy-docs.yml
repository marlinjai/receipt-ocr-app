name: Deploy Docs

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - name: Load Cloudflare credentials from Infisical
        uses: Infisical/secrets-action@v1
        with:
          domain: https://infisical.lumitra.co
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: infra
          env-slug: prod
          secret-path: /providers
          export-type: env
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec clearify build
      - run: npx wrangler pages deploy docs-dist --project-name=receipt-ocr-docs
