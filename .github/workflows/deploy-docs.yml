name: Deploy Docs

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - name: Load Cloudflare credentials from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLOUDFLARE_API_KEY: op://Dev Secrets/Cloudflare Global API Key/credential
          CLOUDFLARE_EMAIL: op://Dev Secrets/Cloudflare Global API Key/email
          CLOUDFLARE_ACCOUNT_ID: op://Dev Secrets/Cloudflare Global API Key/account-id
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec clearify build
      - run: npx wrangler pages deploy docs-dist --project-name=receipt-ocr-docs
