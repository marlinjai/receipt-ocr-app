name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/marlinjai/receipt-ocr-app:latest
            ghcr.io/marlinjai/receipt-ocr-app:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_STORAGE_BRAIN_URL=https://api.storage-brain.lumitra.co
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-verify:
    needs: build-and-push
    permissions:
      contents: read
      deployments: write
    uses: marlinjai/actions-shared/.github/workflows/coolify-deploy-verify.yml@v1
    with:
      health_url: https://receipts.lumitra.co/api/health
      environment: production
    secrets:
      coolify_webhook: ${{ secrets.COOLIFY_WEBHOOK }}
      coolify_token: ${{ secrets.COOLIFY_TOKEN }}
